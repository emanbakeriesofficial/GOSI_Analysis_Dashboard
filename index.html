<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Odoo App Shell Demo</title>
<style>
:root{--bg:#0b1220;--panel:#111827;--panel2:#0f172a;--line:#263244;--text:#e5e7eb;--muted:#94a3b8;--a:#14b8a6;--b:#38bdf8;--c:#8b5cf6;--danger:#ef4444;--ok:#22c55e}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(circle at top,#162036,#0b1220 55%);color:var(--text)}
a{color:inherit}button,input{font:inherit}
.hidden{display:none !important}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}
@media (max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:fixed;inset:0 25% 0 0;transform:translateX(-100%);transition:.2s}.sidebar.open{transform:translateX(0)}}
.sidebar{background:rgba(17,24,39,.96);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:14px;overflow:auto}.brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px}.dot{width:12px;height:12px;border-radius:999px;background:linear-gradient(90deg,var(--a),var(--b))}
.card{background:rgba(15,23,42,.88);border:1px solid var(--line);border-radius:18px;padding:14px}.small{color:var(--muted);font-size:13px;line-height:1.45}.btn{border:none;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer;color:white;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:linear-gradient(90deg,var(--a),var(--b))}.ghost{background:#1f2937;border:1px solid #334155}.danger{background:var(--danger)}.ok{background:var(--ok)}.soft{background:#172033;border:1px solid #2b394d}
.input{width:100%;padding:12px 13px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:var(--text);outline:none}.input:focus{border-color:var(--b)}label{display:block;margin:10px 0 6px;color:#cbd5e1;font-size:13px}
.main{display:flex;flex-direction:column;min-width:0}.topbar{height:66px;background:rgba(17,24,39,.78);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;gap:12px}.top-left,.top-right{display:flex;align-items:center;gap:10px}.iconbtn{width:42px;height:42px;border-radius:12px;background:#1f2937;border:1px solid #334155;color:var(--text);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.content{padding:18px;overflow:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.tile{background:linear-gradient(180deg,rgba(17,24,39,.95),rgba(15,23,42,.9));border:1px solid var(--line);border-radius:20px;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:160px;box-shadow:0 20px 50px rgba(0,0,0,.2)}.tile .ico{font-size:34px}.tile b{font-size:18px}.tile span{color:var(--muted);font-size:13px;word-break:break-all}.tile .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}
.section{background:rgba(17,24,39,.78);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:16px}.header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.pill{padding:6px 10px;border-radius:999px;background:#0b1220;border:1px solid #314158;color:#cbd5e1;font-size:12px}
.navlist{display:grid;gap:8px}.navitem{padding:12px 13px;border-radius:12px;background:#0b1220;border:1px solid #273449;cursor:pointer;display:flex;align-items:center;justify-content:space-between}.navitem.active{border-color:#38bdf8;background:#102238}.navitem small{color:var(--muted)}
.view{display:none}.view.active{display:block}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none}.overlay.show{display:block}@media (min-width:901px){.overlay{display:none !important}}
iframe{width:100%;height:70vh;border:0;border-radius:18px;background:#fff}.status{font-size:14px;color:#a7f3d0;min-height:20px}.warn{color:#fca5a5}.row{display:flex;gap:10px;flex-wrap:wrap}.muted{color:var(--muted)}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="dot"></span> Odoo App Shell</div>
    <div class="card" id="authBox">
      <div class="small" id="authHint">First launch: create admin</div>
      <div id="firstLaunchBox">
        <label>Admin Username</label><input class="input" id="adminU" placeholder="admin" />
        <label>Admin Password</label><input class="input" id="adminP" type="password" placeholder="password" />
        <div class="row" style="margin-top:12px"><button class="btn primary" onclick="createAdmin()">Create Admin</button></div>
      </div>
      <div id="loginBox" class="hidden">
        <label>Username</label><input class="input" id="loginU" placeholder="username" />
        <label>Password</label><input class="input" id="loginP" type="password" placeholder="password" />
        <div class="row" style="margin-top:12px"><button class="btn primary" onclick="login()">Login</button><button class="btn ghost" onclick="prefillAdmin()">Admin</button></div>
      </div>
      <div class="status" id="authStatus"></div>
    </div>
    <div class="card hidden" id="userAdminCard">
      <div class="header"><b>App Users</b><span class="pill" id="userCount">0</span></div>
      <div class="small">Create users for this custom app.</div>
      <label>User Name</label><input class="input" id="newUserName" placeholder="sales01" />
      <label>Password</label><input class="input" id="newUserPass" type="password" placeholder="password" />
      <div class="row" style="margin-top:12px"><button class="btn ok" onclick="createUser()">Add User</button></div>
      <div class="navlist" id="usersList" style="margin-top:12px"></div>
    </div>
    <div class="card hidden" id="shortcutAdminCard">
      <div class="header"><b>Shortcuts</b><span class="pill" id="shortcutCount">0</span></div>
      <div class="small">Create buttons that open inside the app shell.</div>
      <label>Shortcut Name</label><input class="input" id="scName" placeholder="Create Invoice" />
      <label>URL</label><input class="input" id="scUrl" placeholder="https://emanbakery.qbookerp.com/..." />
      <label>Icon</label><input class="input" id="scIcon" placeholder="🧾" />
      <div class="row" style="margin-top:12px"><button class="btn ok" onclick="createShortcut()">Add Shortcut</button></div>
    </div>
    <div class="card hidden" id="loggedBox">
      <div class="header"><b>Session</b><span class="pill" id="mePill"></span></div>
      <div class="row" style="margin-top:12px"><button class="btn ghost" onclick="logout()">Logout</button></div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="top-left"><button class="iconbtn" onclick="toggleSidebar()">☰</button><div><b id="pageTitle">Welcome</b><div class="small" id="pageSub">Create admin to continue</div></div></div>
      <div class="top-right"><button class="iconbtn" onclick="goHome()">⌂</button><button class="iconbtn" onclick="goBack()">←</button></div>
    </div>
    <div class="content">
      <div class="view active" id="homeView">
        <div class="section">
          <div class="header"><h2 style="margin:0">Dashboard</h2><span class="pill" id="modePill">Setup</span></div>
          <p class="small">Use this shell to test app navigation. Shortcuts open inside the iframe container.</p>
        </div>
        <div class="grid" id="shortcutGrid"></div>
      </div>
      <div class="view" id="webViewWrap">
        <div class="section">
          <div class="header"><h2 style="margin:0" id="webTitle">Open Page</h2><div class="row"><button class="btn ghost" onclick="goHome()">Home</button><button class="btn ghost" onclick="goBack()">Back</button><button class="btn primary" onclick="openExternal()">Open External</button></div></div>
          <p class="small" id="webUrl"></p>
        </div>
        <iframe id="webFrame" src="about:blank"></iframe>
      </div>
      <div class="view" id="usersView"></div>
    </div>
  </main>
</div>
<script>
const K='odoo_shell_state_v1';
let navStack=[];
const initial={admin:null,session:null,users:[],shortcuts:[],lastUrl:'about:blank'};
function S(){return Object.assign({},initial,JSON.parse(localStorage.getItem(K)||'{}'))}
function save(s){localStorage.setItem(K,JSON.stringify(s)); render()}
function update(part){save(Object.assign(S(),part))}
function isAdmin(){const s=S(); return s.session && s.admin && s.session===s.admin.u}
function render(){const s=S(); const first=!s.admin;
  document.getElementById('firstLaunchBox').classList.toggle('hidden',!first);
  document.getElementById('loginBox').classList.toggle('hidden',first);
  document.getElementById('userAdminCard').classList.toggle('hidden',!isAdmin());
  document.getElementById('shortcutAdminCard').classList.toggle('hidden',!isAdmin());
  document.getElementById('loggedBox').classList.toggle('hidden',!s.session);
  document.getElementById('mePill').textContent=s.session||'';
  document.getElementById('userCount').textContent=(s.users||[]).length;
  document.getElementById('shortcutCount').textContent=(s.shortcuts||[]).length;
  document.getElementById('modePill').textContent=s.session ? (isAdmin()?'Admin':'User') : 'Setup';
  document.getElementById('authHint').textContent=first?'First launch: create admin':'Login with your app account';
  document.getElementById('pageTitle').textContent=document.querySelector('.view.active#webViewWrap') ? (document.getElementById('webTitle').textContent || 'Open Page') : 'Dashboard';
  document.getElementById('pageSub').textContent=s.session ? (isAdmin()?'Admin controls active':'Using app shortcuts') : 'Create admin to continue';
  document.getElementById('authStatus').textContent='';
  document.getElementById('usersList').innerHTML=(s.users||[]).map(u=>`<div class="navitem"><div><b>${u.name}</b><br><small>${u.pass}</small></div><button class="btn ghost" onclick="deleteUser('${u.name.replace(/'/g,"\\'")}')">Delete</button></div>`).join('')||'<div class="small muted">No users yet.</div>';
  document.getElementById('shortcutGrid').innerHTML=(s.shortcuts||[]).map((x,i)=>`<div class="tile"><div class="ico">${x.icon||'🔗'}</div><b>${x.name}</b><span>${x.url}</span><div class="row"><button class="btn primary" onclick="openShortcut(${i})">Open</button><button class="btn ghost" onclick="editShortcut(${i})">Edit</button><button class="btn danger" onclick="deleteShortcut(${i})">Delete</button></div></div>`).join('')||'<div class="small muted">No shortcuts yet. Admin can add Create Invoice, B2B Customer, Statements.</div>';
}
function createAdmin(){const u=adminU.value.trim(), p=adminP.value.trim(); if(!u||!p){authStatus.textContent='Enter admin username and password'; return;} update({admin:{u,p},session:u}); authStatus.textContent='Admin created';}
function prefillAdmin(){const s=S(); if(s.admin){loginU.value=s.admin.u; loginP.value=s.admin.p}}
function login(){const s=S(); const u=loginU.value.trim(), p=loginP.value; const ok=(s.admin && u===s.admin.u && p===s.admin.p) || (s.users||[]).some(x=>x.name===u && x.pass===p); if(!ok){authStatus.textContent='Wrong credentials'; return;} update({session:u});}
function logout(){update({session:null})}
function createUser(){if(!isAdmin()) return; const s=S(), n=newUserName.value.trim(), p=newUserPass.value.trim(); if(!n||!p){return;} if((s.users||[]).some(x=>x.name===n)){return;} s.users.push({name:n,pass:p}); newUserName.value=''; newUserPass.value=''; save(s)}
function deleteUser(name){const s=S(); s.users=s.users.filter(x=>x.name!==name); save(s)}
function createShortcut(){if(!isAdmin()) return; const s=S(); if(!scUrl.value.trim()) return; s.shortcuts.push({name:scName.value.trim()||'Shortcut',url:scUrl.value.trim(),icon:scIcon.value.trim()||'🔗'}); scName.value=''; scUrl.value=''; scIcon.value=''; save(s)}
function deleteShortcut(i){const s=S(); s.shortcuts.splice(i,1); save(s)}
function editShortcut(i){const x=S().shortcuts[i]; scName.value=x.name; scUrl.value=x.url; scIcon.value=x.icon;}
function openShortcut(i){const x=S().shortcuts[i]; navStack.push({view:'home'}); showWeb(x.name,x.url)}
function showWeb(title,url){document.getElementById('homeView').classList.remove('active'); document.getElementById('usersView').classList.remove('active'); document.getElementById('webViewWrap').classList.add('active'); document.getElementById('webTitle').textContent=title; document.getElementById('webUrl').textContent=url; document.getElementById('webFrame').src=url; document.getElementById('pageTitle').textContent=title; document.getElementById('pageSub').textContent='Inside app shell'; update({lastUrl:url})}
function goHome(){document.getElementById('webViewWrap').classList.remove('active'); document.getElementById('usersView').classList.remove('active'); document.getElementById('homeView').classList.add('active'); document.getElementById('pageTitle').textContent='Dashboard'; document.getElementById('pageSub').textContent='Home';}
function goBack(){if(navStack.length){navStack.pop(); goHome();}}
function openExternal(){const u=document.getElementById('webUrl').textContent; if(u) window.open(u,'_blank','noopener');}
function toggleSidebar(force){const sb=document.getElementById('sidebar'); const ov=document.getElementById('overlay'); if(window.innerWidth<=900){const on=typeof force==='boolean'?force:!sb.classList.contains('open'); sb.classList.toggle('open',on); ov.classList.toggle('show',on);}}
window.addEventListener('resize',()=>toggleSidebar(false));
render();
</script>
</body>
</html>
